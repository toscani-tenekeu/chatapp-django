<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 100px auto; text-align: center; }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>💬 Chat App</h1>
    <p>Enter a room name to join:</p>
    <input id="room-name" type="text" placeholder="Room name...">
    <button onclick="joinRoom()">Join</button>

    <script>
        function joinRoom() {
            const room = document.getElementById('room-name').value.trim();
            if (room) window.location.pathname = '/' + room + '/';
        }

        document.getElementById('room-name').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
